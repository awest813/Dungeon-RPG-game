<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon RPG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ── Elder Scrolls colour tokens ─────────────────────────────── */
    :root {
      --es-bg:          #07070c;
      --es-panel:       rgba(8, 8, 14, 0.95);
      --es-border:      #4e4e5e;
      --es-border-lit:  #8a8a9a;
      --es-gold:        #c8963a;
      --es-gold-bright: #f0c060;
      --es-parchment:   #d8ceb8;
      --es-muted:       #7a7a8a;
      --es-hp:          #7a1515;
      --es-hp-bright:   #c03030;
      --es-xp:          #1a3a6a;
      --es-xp-bright:   #4a8adf;
      --es-enemy:       #8a1010;
      --es-hero:        #1a3a6a;
      --es-stone:       #1a1a22;
      --font-title:     'Cinzel Decorative', 'Cinzel', Georgia, serif;
      --font-body:      'Cinzel', Georgia, serif;
    }

    /* ── Reset + base ─────────────────────────────────────────────── */
    html, body {
      overflow: hidden;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--es-bg);
      font-family: var(--font-body);
      color: var(--es-parchment);
    }

    #babylon-canvas {
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* ── Shared panel chrome ───────────────────────────────────────── */
    .es-panel {
      background: var(--es-panel);
      border: 1px solid var(--es-border);
      box-shadow: inset 0 0 0 1px rgba(78,78,94,0.35),
                  0 0 24px rgba(0,0,0,0.8);
      padding: 20px 28px;
    }

    /* ── Decorative section divider ──────────────────────────────── */
    .es-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      color: var(--es-border-lit);
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 6px 0;
    }
    .es-divider::before,
    .es-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--es-border-lit), transparent);
    }

    /* ── HP / resource bars ───────────────────────────────────────── */
    .es-bar-wrap {
      width: 100%;
      height: 8px;
      background: #1a1a22;
      border: 1px solid var(--es-border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 2px;
    }
    .es-bar-fill {
      height: 100%;
      border-radius: 1px;
      transition: width 0.3s ease;
    }
    .es-bar-hp   { background: linear-gradient(90deg, var(--es-hp), var(--es-hp-bright)); }
    .es-bar-xp   { background: linear-gradient(90deg, var(--es-xp), var(--es-xp-bright)); }

    /* ── Buttons ──────────────────────────────────────────────────── */
    .es-btn {
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--es-parchment);
      background: linear-gradient(180deg, #18181f 0%, #0e0e14 100%);
      border: 1px solid var(--es-border);
      border-bottom-color: var(--es-border-lit);
      padding: 7px 18px;
      cursor: pointer;
      border-radius: 2px;
      letter-spacing: 0.5px;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .es-btn:hover {
      background: linear-gradient(180deg, #24242e 0%, #18181f 100%);
      border-color: var(--es-gold);
      color: var(--es-gold-bright);
    }
    .es-btn:active {
      background: #0a0a10;
    }
    .es-btn--primary {
      border-color: var(--es-gold);
      color: var(--es-gold);
      font-size: 0.95rem;
      padding: 9px 28px;
    }
    .es-btn--primary:hover {
      background: linear-gradient(180deg, #28200e 0%, #1a1408 100%);
      color: var(--es-gold-bright);
    }
    .es-btn--danger {
      border-color: #7a2020;
      color: #c05050;
    }
    .es-btn--disabled {
      color: #444450;
      border-color: #2a2a34;
      cursor: not-allowed;
      background: #0c0c12;
    }
    .es-btn--enemy {
      border-color: #7a2020;
      color: #d07070;
    }
    .es-btn--enemy:hover {
      border-color: #c03030;
      color: #f08080;
    }
    .es-btn--ally {
      border-color: #1e3a6e;
      color: #70a0d0;
    }
    .es-btn--ally:hover {
      border-color: #4a7aaa;
      color: #90c0f0;
    }

    /* ── Section heading ─────────────────────────────────────────── */
    .es-heading {
      font-family: var(--font-body);
      font-size: 0.72rem;
      color: var(--es-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
  </style>
  <script type="module" src="./src/main.ts"></script>
</head>
<body>
  <canvas id="babylon-canvas"></canvas>
</body>
</html>
